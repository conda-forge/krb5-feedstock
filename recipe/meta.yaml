{% set version = "1.22.2" %}

package:
  name: krb5
  version: {{ version }}

source:
  url: https://github.com/krb5/krb5/archive/krb5-{{ version }}-final.tar.gz
  sha256: 289f5bb81d1f2f8d5eecebe56a056aeed95d35fd9bb4a7071c5dd7ad4b3fe888
  patches:
    # see https://github.com/krb5/krb5/pull/1528
    - patches/0001-fix-windows-arm64-cross-build.patch  # [win]

build:
  number: 1
  run_exports:
    # stable within minor revisions: https://abi-laboratory.pro/tracker/timeline/krb5/
    - {{ pin_subpackage('krb5', max_pin='x.x') }}
  missing_dso_whitelist:   # [osx]
    - /usr/lib/libresolv.9.dylib  # [osx]

requirements:
  build:
    - {{ stdlib('c') }}
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - autoconf    # [unix]
    - bison       # [unix]
    - make        # [unix]
    - libtool     # [unix]
    - pkg-config  # [unix]
    - python *    # [unix]
    - posix       # [win]
    - perl        # [win]
    - gettext
  host:
    - libedit     # [unix]
    - openssl
    - keyutils    # [linux]
  run:
    - {{ pin_compatible('libedit') }}  # [unix]

test:
  commands:
    - test -f ${PREFIX}/lib/libkrb5${SHLIB_EXT}         # [unix]
    - if not exist %LIBRARY_BIN%\krb5_64.dll exit 1     # [win]

outputs:
  - name: krb5

  - name: krb5-static
    build:
      skip: true  # [win]
    script: build_static.sh
    requirements:
      build:
        - {{ stdlib('c') }}
        - {{ compiler('c') }}
        - {{ compiler('cxx') }}
        - autoconf    # [unix]
        - bison       # [unix]
        - make        # [unix]
        - pkg-config  # [unix]
        - python {{ python_min }}
        - gettext
      host:
        - libedit     # [unix]
        - openssl
      run:
        - {{ pin_subpackage('krb5', exact=True) }}
        - {{ pin_compatible('libedit') }}  # [unix]
    test:
      commands:
        - test -f ${PREFIX}/lib/libk5crypto.a  # [unix]

about:
  home: http://web.mit.edu/kerberos/
  license: MIT
  license_file: doc/notice.rst
  summary: A network authentication protocol.
  dev_url: https://github.com/krb5/krb5

extra:
  recipe-maintainers:
    - pelson
    - ocefpaf
    - mingwandroid
    - mariusvniekerk
    - wolfv
    - h-vetinari
